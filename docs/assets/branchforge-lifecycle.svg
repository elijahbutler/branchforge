<svg xmlns="http://www.w3.org/2000/svg" width="960" height="360" viewBox="0 0 960 360" role="img" aria-labelledby="title desc">
  <title id="title">BranchForge lifecycle</title>
  <desc id="desc">A five-step lifecycle: frame a stage, branch hypotheses, explore independently, verify evidence, and commit a dossier.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#475569"/>
    </marker>
  </defs>
  <rect width="960" height="360" fill="#ffffff"/>
  <text x="42" y="54" fill="#0f172a" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="30" font-weight="800">Evidence-driven branch lifecycle</text>
  <text x="42" y="84" fill="#475569" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="16">Every stage keeps alternatives explicit until verification justifies a collapse.</text>

  <g font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <g transform="translate(42 132)">
      <rect width="144" height="112" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
      <circle cx="28" cy="30" r="13" fill="#2563eb"/>
      <text x="23" y="35" fill="#ffffff" font-size="14" font-weight="800">1</text>
      <text x="22" y="64" fill="#0f172a" font-size="17" font-weight="800">Frame</text>
      <text x="22" y="88" fill="#334155" font-size="13">Goal, stage,</text>
      <text x="22" y="106" fill="#334155" font-size="13">rubric, invariants</text>
    </g>
    <path d="M198 188 H254" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <g transform="translate(266 132)">
      <rect width="144" height="112" rx="10" fill="#ecfeff" stroke="#a5f3fc"/>
      <circle cx="28" cy="30" r="13" fill="#0891b2"/>
      <text x="23" y="35" fill="#ffffff" font-size="14" font-weight="800">2</text>
      <text x="22" y="64" fill="#0f172a" font-size="17" font-weight="800">Branch</text>
      <text x="22" y="88" fill="#334155" font-size="13">Distinct claims,</text>
      <text x="22" y="106" fill="#334155" font-size="13">predictions, risks</text>
    </g>
    <path d="M422 188 H478" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <g transform="translate(490 132)">
      <rect width="144" height="112" rx="10" fill="#f0fdf4" stroke="#bbf7d0"/>
      <circle cx="28" cy="30" r="13" fill="#16a34a"/>
      <text x="23" y="35" fill="#ffffff" font-size="14" font-weight="800">3</text>
      <text x="22" y="64" fill="#0f172a" font-size="17" font-weight="800">Explore</text>
      <text x="22" y="88" fill="#334155" font-size="13">Independent work,</text>
      <text x="22" y="106" fill="#334155" font-size="13">evidence, artifacts</text>
    </g>
    <path d="M646 188 H702" stroke="#475569" stroke-width="2.5" marker-end="url(#arrow)"/>
    <g transform="translate(714 132)">
      <rect width="144" height="112" rx="10" fill="#fff7ed" stroke="#fed7aa"/>
      <circle cx="28" cy="30" r="13" fill="#f97316"/>
      <text x="23" y="35" fill="#ffffff" font-size="14" font-weight="800">4</text>
      <text x="22" y="64" fill="#0f172a" font-size="17" font-weight="800">Verify</text>
      <text x="22" y="88" fill="#334155" font-size="13">Hard checks before</text>
      <text x="22" y="106" fill="#334155" font-size="13">preference judging</text>
    </g>
  </g>

  <path d="M786 258 C764 304 650 318 510 318 C330 318 178 298 130 258" fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="7 7"/>
  <g transform="translate(392 274)" font-family="Inter, ui-sans-serif, system-ui, sans-serif">
    <rect width="178" height="54" rx="10" fill="#0f172a"/>
    <text x="24" y="34" fill="#ffffff" font-size="16" font-weight="800">Commit dossier</text>
  </g>
</svg>
