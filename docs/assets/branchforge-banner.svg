<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">BranchForge banner</title>
  <desc id="desc">BranchForge branches difficult decisions and collapses them with evidence.</desc>
  <rect width="1280" height="420" fill="#0f172a"/>
  <rect x="0" y="284" width="1280" height="136" fill="#134e4a"/>
  <path d="M0 284 C190 246 280 332 470 288 C650 246 756 278 930 230 C1088 186 1176 210 1280 178 L1280 420 L0 420 Z" fill="#0f766e"/>
  <path d="M0 76 C170 118 292 42 450 88 C628 140 760 64 934 98 C1098 130 1188 80 1280 104" fill="none" stroke="#38bdf8" stroke-width="3" opacity="0.42"/>

  <text x="82" y="82" fill="#cbd5e1" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700">BranchForge</text>
  <text x="82" y="158" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="700">Branch difficult decisions.</text>
  <text x="82" y="226" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="700">Collapse with evidence.</text>
  <text x="82" y="286" fill="#dbeafe" font-family="Arial, Helvetica, sans-serif" font-size="24">Durable branch graphs, independent exploration, verified outcomes, and replayable dossiers.</text>

  <g transform="translate(842 96)">
    <rect x="0" y="0" width="328" height="226" rx="18" fill="#f8fafc"/>
