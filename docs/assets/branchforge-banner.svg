    <text x="118" y="38" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">branches</text>
    <text x="232" y="38" fill="#0f172a" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700">commit</text>
    <circle cx="50" cy="116" r="18" fill="#0f172a"/>
    <circle cx="154" cy="76" r="17" fill="#2563eb"/>
    <circle cx="154" cy="116" r="17" fill="#0891b2"/>
    <circle cx="154" cy="156" r="17" fill="#16a34a"/>
    <circle cx="266" cy="116" r="21" fill="#f59e0b"/>
    <path d="M68 116 L136 76 M68 116 L136 116 M68 116 L136 156 M172 76 C210 78 226 96 246 108 M172 116 L244 116 M172 156 C210 154 226 136 246 124" fill="none" stroke="#334155" stroke-width="5" stroke-linecap="round"/>
    <rect x="36" y="190" width="256" height="12" rx="6" fill="#e2e8f0"/>
    <rect x="36" y="190" width="190" height="12" rx="6" fill="#14b8a6"/>
